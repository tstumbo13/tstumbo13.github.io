<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0c0a" />
  <meta name="description" content="Kettlebell workouts built for the long run. Track your lifts, follow guided sessions, get stronger." />
  <title>Horsepower · Kettlebell Workouts Built for the Long Run</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Horsepower" />

  <style>
  :root{
    --ink:#0d0c0a; --char:#161413; --surface:#1c1a17; --surface2:#232019;
    --border:#2e2a25; --sage:#6b8068; --sage-bright:#8aa787; --bone:#efe9d9;
    --ash:#b0a99a; --steel:#9a9588; --gold:#c9a86a; --danger:#c46b5a;
    --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--bone);
    font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;}
  body{font-size:16px;line-height:1.5}
  h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-0.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:var(--sage-bright);text-decoration:none}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px}
  .muted{color:var(--steel)}
  .accent{color:var(--sage-bright)}
  .hide{display:none !important}

  /* ===== top bar ===== */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(13,12,10,0.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
    padding-top:var(--safe-top);}
  .topbar-in{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;max-width:560px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:24px;height:24px;color:var(--sage)}
  .brand .nm{font-size:15px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--bone)}
  .gear{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;color:var(--ash)}
  .gear:active{background:var(--surface)}

  /* ===== views ===== */
  #app{padding-bottom:calc(76px + var(--safe-bot))}
  .view-pad{padding-top:22px}
  .page-h{font-size:26px;font-weight:800;margin-bottom:3px}
  .page-sub{color:var(--steel);font-size:14px;margin-bottom:20px}
  .section-h{font-size:12px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;
    color:var(--sage);margin:26px 0 12px}

  /* ===== cards ===== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
  .card+.card{margin-top:12px}
  .wkt{display:block;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;transition:border-color .15s}
  .wkt:active{border-color:var(--sage)}
  .wkt .nm{font-size:18px;font-weight:800}
  .wkt .meta{display:flex;gap:8px;flex-wrap:wrap;margin:7px 0 9px}
  .pill{font-size:11px;font-weight:700;letter-spacing:0.04em;padding:4px 9px;border-radius:20px;
    background:var(--surface2);color:var(--ash);border:1px solid var(--border)}
  .pill.sage{background:rgba(107,128,104,0.16);color:var(--sage-bright);border-color:rgba(107,128,104,0.3)}
  .wkt .desc{color:var(--steel);font-size:13.5px;line-height:1.45}

  /* ===== buttons ===== */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--sage);color:#0a0f0a;font-weight:800;font-size:16px;
    padding:15px 22px;border-radius:13px;width:100%;transition:filter .15s;min-height:50px}
  .btn:active{filter:brightness(1.1)}
  .btn.ghost{background:transparent;color:var(--bone);border:1px solid var(--border)}
  .btn.ghost:active{background:var(--surface)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(196,107,90,0.4)}
  .btn.sm{padding:10px 16px;font-size:14px;width:auto;min-height:40px}
  .btn:disabled{opacity:0.4}
  .row{display:flex;gap:10px}
  .row .btn{flex:1}

  /* ===== chips ===== */
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:13px;font-weight:600;padding:9px 14px;border-radius:11px;
    background:var(--surface);border:1px solid var(--border);color:var(--ash);min-height:40px;
    display:inline-flex;align-items:center}
  .chip.on{background:rgba(107,128,104,0.18);border-color:var(--sage);color:var(--bone)}

  /* ===== hero / home ===== */
  .hero{padding:8px 0 4px}
  .hero .hi{font-size:13px;color:var(--steel);letter-spacing:0.04em}
  .hero .big{font-size:30px;font-weight:800;line-height:1.15;margin:4px 0 2px}
  .stat-row{display:flex;gap:10px;margin:18px 0 4px}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center}
  .stat .n{font-size:24px;font-weight:800;color:var(--sage-bright)}
  .stat .l{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--steel);margin-top:3px}
  .reco{background:linear-gradient(160deg,var(--surface2),var(--surface));
    border:1px solid var(--border);border-radius:18px;padding:20px;margin-top:8px}
  .reco .tag{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage)}
  .reco .nm{font-size:22px;font-weight:800;margin:5px 0 6px}
  .reco .desc{color:var(--steel);font-size:13.5px;margin-bottom:16px}

  /* ===== bottom nav ===== */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:rgba(13,12,10,0.94);backdrop-filter:blur(10px);
    border-top:1px solid var(--border);padding-bottom:var(--safe-bot);
    display:flex;justify-content:space-around;max-width:560px;margin:0 auto}
  nav.tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:9px 4px 8px;color:var(--steel);font-size:10px;font-weight:600;letter-spacing:0.02em}
  nav.tabs button svg{width:22px;height:22px}
  nav.tabs button.on{color:var(--sage-bright)}

  /* ===== library ===== */
  .lib-grid{display:flex;flex-direction:column;gap:0}
  .lib-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    padding:14px 4px;border-bottom:1px solid var(--border)}
  .lib-row .ic{width:38px;height:38px;border-radius:10px;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;color:var(--sage);flex:none;font-weight:800;font-size:13px}
  .lib-row .nm{font-weight:700;font-size:15px}
  .lib-row .sub{font-size:12px;color:var(--steel);margin-top:1px}
  .lib-row .best{font-size:12px;color:var(--sage-bright);font-weight:700;flex:none}

  /* ===== detail ===== */
  .detail-cue{font-size:16px;line-height:1.6;color:var(--bone);margin:14px 0}
  .kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px}
  .kv .k{color:var(--steel)}
  .round-h{font-size:12px;font-weight:700;color:var(--sage);margin:18px 0 4px;letter-spacing:0.04em}
  .round-h span{color:var(--steel);font-weight:600;letter-spacing:0}
  .video-box{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;
    background:var(--char);border:1px solid var(--border);margin:8px 0}
  .video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  /* ===== player ===== */
  .player{position:fixed;inset:0;z-index:50;background:var(--ink);display:flex;flex-direction:column;
    padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
  .pl-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
  .pl-quit{color:var(--steel);font-size:14px;font-weight:600}
  .pl-prog{font-size:13px;color:var(--ash);font-weight:600}
  .pl-bar{height:3px;background:var(--border);border-radius:2px;margin:0 18px;overflow:hidden}
  .pl-bar i{display:block;height:100%;background:var(--sage);transition:width .3s}
  .pl-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;gap:6px}
  .pl-round{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage)}
  .pl-move{font-size:34px;font-weight:800;line-height:1.1;margin:4px 0}
  .pl-target{font-size:20px;font-weight:700;color:var(--sage-bright)}
  .pl-cue{font-size:15px;color:var(--steel);line-height:1.55;max-width:420px;margin-top:8px}
  .pl-timer{font-size:74px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;margin:6px 0}
  .pl-timer.rest{color:var(--gold)}
  .pl-ring{font-size:13px;color:var(--steel);text-transform:uppercase;letter-spacing:0.1em}
  .pl-ctrl{padding:18px;display:flex;flex-direction:column;gap:10px}
  .pl-foot{display:flex;gap:10px}
  .pl-foot .btn{flex:1}
  .icon-btn{width:54px;height:54px;border-radius:50%;border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--bone);background:var(--surface);flex:none}

  /* ===== log row ===== */
  .logbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;width:100%;max-width:420px}
  .logbox h4{font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--sage);margin-bottom:14px}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .stepper button{width:46px;height:46px;font-size:24px;font-weight:700;color:var(--bone);background:var(--surface2)}
  .stepper button:active{background:var(--border)}
  .stepper input{flex:1;text-align:center;background:transparent;border:none;color:var(--bone);
    font-size:22px;font-weight:800;width:60px;font-variant-numeric:tabular-nums}
  .stepper input:focus{outline:none}
  .log-grid{display:flex;gap:12px;margin-bottom:14px}
  .log-grid>div{flex:1}
  .log-grid label{display:block;font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .unit-sfx{font-size:13px;color:var(--steel);align-self:center;padding:0 4px}

  /* ===== modal / sheet ===== */
  .sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--char);border:1px solid var(--border);border-top-left-radius:22px;border-top-right-radius:22px;
    width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px 18px calc(22px + var(--safe-bot))}
  .sheet h3{font-size:20px;margin-bottom:4px}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}

  /* ===== onboarding ===== */
  .ob{position:fixed;inset:0;z-index:70;background:var(--ink);overflow-y:auto;
    padding:calc(28px + var(--safe-top)) 22px calc(28px + var(--safe-bot))}
  .ob-in{max-width:460px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .ob .logo{width:54px;height:54px;color:var(--sage);margin-bottom:18px}
  .ob h2{font-size:27px;font-weight:800;line-height:1.15;margin-bottom:10px}
  .ob p{color:var(--steel);font-size:15px;line-height:1.55;margin-bottom:22px}
  .ob-opt{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:16px 18px;margin-bottom:11px;transition:border-color .15s}
  .ob-opt.on,.ob-opt:active{border-color:var(--sage);background:rgba(107,128,104,0.1)}
  .ob-opt .t{font-weight:700;font-size:16px}
  .ob-opt .d{font-size:13px;color:var(--steel);margin-top:2px}
  .ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
  .ob-dots i{width:7px;height:7px;border-radius:50%;background:var(--border)}
  .ob-dots i.on{background:var(--sage)}
  .spacer{flex:1}

  .empty{text-align:center;color:var(--steel);padding:40px 20px;font-size:14px;line-height:1.6}
  .toast{position:fixed;bottom:calc(90px + var(--safe-bot));left:50%;transform:translateX(-50%);
    background:var(--bone);color:var(--ink);font-weight:700;font-size:14px;padding:11px 20px;
    border-radius:30px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}

  @media (hover:hover){
    .wkt:hover{border-color:var(--sage)}
    .chip:hover{border-color:var(--sage)}
    .btn:hover{filter:brightness(1.08)}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important}}
  </style>
</head>
<body>
  <div class="topbar" id="topbar">
    <div class="topbar-in">
      <div class="brand">
        <svg viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
          <path d="M38 14 Q38 6 50 6 Q62 6 62 14 L62 28 Q62 30 60 30 L58 30 Q56 30 56 28 L56 18 Q56 12 50 12 Q44 12 44 18 L44 28 Q44 30 42 30 L40 30 Q38 30 38 28 Z"/>
          <ellipse cx="50" cy="62" rx="34" ry="32"/>
          <rect x="34" y="28" width="32" height="8" rx="2"/>
        </svg>
        <span class="nm">Horsepower</span>
      </div>
      <button class="gear" id="gearBtn" aria-label="Settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <main id="app"></main>

  <nav class="tabs" id="tabs"></nav>

  <div id="overlay"></div>
  <div class="toast" id="toast"></div>

  <script>
  /* ============================================================
     HORSEPOWER — kettlebell training app (self-contained)
     ============================================================ */
  const $=(s,r)=>(r||document).querySelector(s);
  const $$=(s,r)=>Array.from((r||document).querySelectorAll(s));

  /* ---------- storage (keeps legacy forge-* keys so existing users keep data) ---------- */
  const K={hist:'forge-history-v1',custom:'forge-custom-workouts-v1',notes:'forge-notes-v1',settings:'forge-settings-v1'};
  function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  const DEFAULTS={sound:true,vibration:true,unit:'lb',onboarded:false,goal:null,experience:null,bells:[],warmup:true};
  let S={
    settings:Object.assign({},DEFAULTS,load(K.settings,{})),
    history:load(K.hist,[]),
    customs:load(K.custom,[]),
    notes:load(K.notes,{})
  };
  function saveSettings(){save(K.settings,S.settings);}
  function saveHistory(){save(K.hist,S.history);}
  function saveCustoms(){save(K.custom,S.customs);}

  /* ---------- data (preserved verbatim from the original build) ---------- */
  const MOVES={"two-hand-swing":{name:"Two-Hand Swing",category:"Power",difficulty:"Beginner",targets:"Glutes \xB7 Hamstrings \xB7 Core",cue:"Hinge at the hips. Drive through the heels. Snap the hips to float the bell to chest height.",videoId:"1Qi0NQW89Oc",pairs:["goblet-squat","press","row","farmer-carry"]},"single-arm-swing":{name:"Single-Arm Swing",category:"Power",difficulty:"Intermediate",targets:"Glutes \xB7 Core \xB7 Grip",cue:"Same hinge as the two-hand. Free hand mirrors the bell. Resist the twist at the top.",pairs:["clean","press","row","snatch"]},clean:{name:"Single-Arm Clean",category:"Power",difficulty:"Intermediate",targets:"Posterior Chain \xB7 Shoulders",cue:"Zip the bell up the body. Catch in the rack position with a soft, silent landing.",optional:"With two matched bells, clean both at once for the Double Clean — symmetric, heavier work.",pairs:["press","goblet-squat","row","snatch"]},snatch:{name:"Single-Arm Snatch",category:"Power",difficulty:"Advanced",targets:"Full Body \xB7 Conditioning",cue:"High pull, punch through, catch overhead in one fluid motion. The bell rests, not lands.",pairs:["goblet-squat","farmer-carry","push-press","overhead-carry"]},"push-press":{name:"Push Press",category:"Power",difficulty:"Intermediate",targets:"Shoulders \xB7 Legs \xB7 Core",cue:"Dip the knees a few inches. Drive up. Use leg drive to punch the bell overhead.",optional:"With two matched bells, work both sides at once for a Double Push Press.",pairs:["row","goblet-squat","two-hand-swing","snatch"]},"sumo-pull":{name:"Sumo High Pull",category:"Power",difficulty:"Intermediate",targets:"Posterior Chain \xB7 Traps",cue:"Wide stance, toes out. Pull from the hips. Elbows lead the bell up to chin height.",pairs:["thruster","two-hand-swing","snatch","farmer-carry"]},"goblet-squat":{name:"Goblet Squat",category:"Strength",difficulty:"Beginner",targets:"Quads \xB7 Glutes \xB7 Core",cue:"Hold the bell at chest by the horns. Elbows track between the knees. Sit between the heels.",pairs:["two-hand-swing","press","deadlift","halo"]},"front-rack-squat":{name:"Front Rack Squat",category:"Strength",difficulty:"Intermediate",targets:"Quads \xB7 Upper Back \xB7 Core",cue:"Bell in the rack, elbow tight to the ribs. Squat with a vertical torso. Sit between the heels.",optional:"With two matched bells, hold both in the rack position for a double front rack squat.",pairs:["press","two-hand-swing","row","halo"]},press:{name:"Strict Press",category:"Strength",difficulty:"Beginner",targets:"Shoulders \xB7 Triceps \xB7 Core",cue:"Brace the trunk. Press straight overhead. Finish with the bicep past the ear.",optional:"If you have two matched bells, press both at the same time for a heavier symmetric variation.",pairs:["row","two-hand-swing","goblet-squat","halo"]},"clean-and-press":{name:"Clean & Press",category:"Strength",difficulty:"Intermediate",targets:"Full Body \xB7 Shoulders",cue:"Clean to rack. Brief pause. Press overhead. One fluid sequence, one breath cycle.",pairs:["goblet-squat","row","snatch","farmer-carry"]},row:{name:"Bent-Over Row",category:"Strength",difficulty:"Beginner",targets:"Lats \xB7 Mid-Back \xB7 Biceps",cue:"Hinge to forty-five degrees. Pull the bell to the hip. Squeeze the shoulder blade hard.",pairs:["press","two-hand-swing","deadlift","farmer-carry"]},"renegade-row":{name:"Plank Row",category:"Strength",difficulty:"Advanced",targets:"Lats \xB7 Core \xB7 Shoulders",cue:"Plank position, one hand on the bell. Row to the hip. Switch sides each rep. Fight the rotation — keep the hips square.",optional:"For trainees with two matched bells, this becomes the classic Renegade Row — plank over both bells, alternating rows.",pairs:["thruster","two-hand-swing","push-press","figure-eight"]},deadlift:{name:"Kettlebell Deadlift",category:"Strength",difficulty:"Beginner",targets:"Hamstrings \xB7 Glutes \xB7 Back",cue:"Push the floor away. Hinge, do not squat. Lock out with the glutes, not the lower back.",pairs:["press","row","farmer-carry","single-leg-deadlift"]},"single-leg-deadlift":{name:"Single-Leg Deadlift",category:"Strength",difficulty:"Intermediate",targets:"Hamstrings \xB7 Glutes \xB7 Balance",cue:"Hinge over a planted leg. Back leg lifts like a kickstand. Pull the bell to standing.",pairs:["row","press","goblet-squat","halo"]},"reverse-lunge":{name:"Reverse Lunge",category:"Strength",difficulty:"Beginner",targets:"Quads \xB7 Glutes \xB7 Hips",cue:"Hold the bell in goblet or rack. Step back, drop the rear knee. Drive through the front heel.",optional:"With two matched bells, hold one in each hand at your sides (suitcase) or both in rack for more load.",pairs:["press","row","halo","goblet-squat"]},thruster:{name:"Thruster",category:"Conditioning",difficulty:"Intermediate",targets:"Legs \xB7 Shoulders \xB7 Core",cue:"Bell in the rack on one side. Front squat, then drive up and press the bell overhead in one motion. Use the legs to launch.",optional:"For trainees with two matched bells, work both sides at once as a Double Thruster — same movement, symmetric load.",pairs:["row","two-hand-swing","farmer-carry","renegade-row"]},"farmer-carry":{name:"Farmer Carry",category:"Conditioning",difficulty:"Beginner",targets:"Grip \xB7 Core \xB7 Traps",cue:"Tall posture. Tight midline. Shoulders packed. Walk with purpose, never with slack.",pairs:["two-hand-swing","goblet-squat","press","deadlift"]},"suitcase-carry":{name:"Suitcase Carry",category:"Conditioning",difficulty:"Beginner",targets:"Obliques \xB7 Grip \xB7 Core",cue:"One bell, one side. Stay tall and square. Do not let the loaded side dip.",pairs:["two-hand-swing","press","row","single-leg-deadlift"]},"turkish-getup":{name:"Turkish Get-Up",category:"Stability",difficulty:"Advanced",targets:"Full Body \xB7 Shoulder \xB7 Core",cue:"Eyes on the bell. Press, roll to elbow, post the hand, sweep the leg, stand. Reverse it.",pairs:["two-hand-swing","windmill","press","overhead-carry"]},"bottoms-up-press":{name:"Bottoms-Up Press",category:"Stability",difficulty:"Advanced",targets:"Shoulders \xB7 Grip \xB7 Core",cue:"Press the bell with the bottom up, handle in hand. Crush the grip. Stay tight head to toe.",pairs:["row","two-hand-swing","halo","turkish-getup"]},"overhead-carry":{name:"Overhead Carry",category:"Stability",difficulty:"Intermediate",targets:"Shoulders \xB7 Core \xB7 Posture",cue:"Bell locked out overhead. Bicep past the ear. Walk with purpose — eyes forward.",pairs:["press","snatch","turkish-getup","windmill"]},halo:{name:"Halo",category:"Mobility",difficulty:"Beginner",targets:"Shoulders \xB7 Thoracic Spine",cue:"Circle the bell around the head. Keep the elbows tight, ribs down, eyes forward.",pairs:["press","goblet-squat","turkish-getup","windmill"]},windmill:{name:"Windmill",category:"Mobility",difficulty:"Intermediate",targets:"Obliques \xB7 Shoulders \xB7 Hips",cue:"Eyes locked on the bell overhead. Push the hip out. Reach the free hand to the floor.",pairs:["turkish-getup","press","halo","cossack-squat"]},"around-the-world":{name:"Around the World",category:"Mobility",difficulty:"Beginner",targets:"Shoulders \xB7 Core \xB7 Coordination",cue:"Pass the bell around the waist in a circle. Stay tall. Switch direction halfway through.",pairs:["halo","goblet-squat","press","windmill"]},"cossack-squat":{name:"Cossack Squat",category:"Mobility",difficulty:"Intermediate",targets:"Hips \xB7 Adductors \xB7 Ankles",cue:"Wide stance, bell at chest. Shift weight to one side; opposite foot rolls to its heel.",pairs:["windmill","halo","press","goblet-squat"]},"figure-eight":{name:"Figure 8",category:"Core",difficulty:"Intermediate",targets:"Core \xB7 Coordination",cue:"Weave the bell between the legs in a figure eight. Stay low. Stay loose. Stay smooth.",pairs:["russian-twist","snatch","thruster","two-hand-swing"]},"russian-twist":{name:"Russian Twist",category:"Core",difficulty:"Beginner",targets:"Obliques \xB7 Abs",cue:"Seated, lean back to forty-five. Rotate the bell side to side. Tap the floor each rep.",pairs:["figure-eight","halo","farmer-carry","deadlift"]}};

  const PRESETS=[{id:"foundation",name:"The Foundation",tag:"Beginner",duration:"~18 min",bells:1,description:"Master the basics. Three rounds of the six fundamental movements. Light load. Perfect form.",blocks:[{id:"halo",mode:"reps",reps:"5 each way",rest:30},{type:"round",rounds:3,name:"Strength Circuit",restBetweenRounds:60,blocks:[{id:"goblet-squat",mode:"reps",reps:"10",rest:30},{id:"two-hand-swing",mode:"time",duration:25,rest:30},{id:"press",mode:"reps",reps:"5 each side",rest:30},{id:"row",mode:"reps",reps:"8 each side",rest:45}]},{id:"farmer-carry",mode:"time",duration:45,rest:0}]},{id:"forge",name:"The Engine",tag:"Intermediate",duration:"~25 min",bells:1,description:"Build the engine. Three rounds of clean, press, squat, and row. Power finisher.",blocks:[{id:"halo",mode:"reps",reps:"8 each way",rest:20},{id:"two-hand-swing",mode:"time",duration:40,rest:60},{type:"round",rounds:3,name:"Strength Circuit",restBetweenRounds:75,blocks:[{id:"clean",mode:"reps",reps:"6 each side",rest:30},{id:"press",mode:"reps",reps:"5 each side",rest:30},{id:"goblet-squat",mode:"reps",reps:"10",rest:30},{id:"row",mode:"reps",reps:"8 each side",rest:45}]},{id:"thruster",mode:"time",duration:30,rest:60},{id:"farmer-carry",mode:"time",duration:60,rest:0}]},{id:"anvil",name:"The Anvil",tag:"Advanced",duration:"~32 min",bells:1,description:"Heavy strength work. Five rounds of compound lifts, three rounds of power. Slow on the way down. Ballistic on the way up.",blocks:[{id:"turkish-getup",mode:"reps",reps:"2 each side",rest:75},{type:"round",rounds:5,name:"Heavy Block",restBetweenRounds:90,blocks:[{id:"deadlift",mode:"reps",reps:"5 (heavy)",rest:75},{id:"press",mode:"reps",reps:"4 each side (heavy)",rest:75},{id:"front-rack-squat",mode:"reps",reps:"6 (heavy)",rest:60}]},{type:"round",rounds:3,name:"Power Finisher",restBetweenRounds:60,blocks:[{id:"snatch",mode:"reps",reps:"5 each side",rest:30},{id:"windmill",mode:"reps",reps:"3 each side",rest:45}]},{id:"two-hand-swing",mode:"time",duration:60,rest:0}]},{id:"emom-iron",name:"EMOM Iron",tag:"Conditioning \xB7 Circuit",duration:"~14 min",bells:1,description:"Every minute on the minute. Four rounds of three movements. Beat the clock.",blocks:[{id:"halo",mode:"reps",reps:"5 each way",rest:30},{type:"round",rounds:4,name:"EMOM Circuit",blocks:[{id:"two-hand-swing",mode:"reps",reps:"15",rest:15},{id:"goblet-squat",mode:"reps",reps:"10",rest:15},{id:"push-press",mode:"reps",reps:"6 each side",rest:30}]},{id:"farmer-carry",mode:"time",duration:60,rest:0}]},{id:"inferno",name:"Inferno",tag:"Conditioning",duration:"~15 min",bells:1,description:"Forty seconds on, twenty off. Three rounds. Burn the lungs to ash.",blocks:[{type:"round",rounds:3,name:"Burn Circuit",restBetweenRounds:60,blocks:[{id:"two-hand-swing",mode:"time",duration:40,rest:20},{id:"goblet-squat",mode:"time",duration:40,rest:20},{id:"figure-eight",mode:"time",duration:40,rest:60}]},{id:"farmer-carry",mode:"time",duration:60,rest:0}]},{id:"iron-core",name:"Iron Core",tag:"Core Focus",duration:"~16 min",bells:1,description:"Bracing. Rotation. Anti-rotation. Three rounds of midline work, bookended by halos and carries.",blocks:[{id:"halo",mode:"reps",reps:"8 each way",rest:30},{id:"turkish-getup",mode:"reps",reps:"2 each side",rest:60},{type:"round",rounds:3,name:"Core Circuit",restBetweenRounds:60,blocks:[{id:"windmill",mode:"reps",reps:"3 each side",rest:30},{id:"russian-twist",mode:"time",duration:30,rest:30},{id:"figure-eight",mode:"time",duration:30,rest:30}]},{id:"farmer-carry",mode:"time",duration:60,rest:0}]}];

  /* ---------- helpers ---------- */
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function isLoggable(id){ // carries / mobility get logged too, but warmup-style skips weight prompt for pure bodyweight — here all kb moves are loggable
    return !!MOVES[id];

  function fmtClock(s){s=Math.max(0,Math.round(s));const m=Math.floor(s/60),x=s%60;return m+':'+String(x).padStart(2,'0');}
  function dayKey(d){const t=d instanceof Date?d:new Date(d);return t.getFullYear()+'-'+t.getMonth()+'-'+t.getDate();}
  function fmtDate(d){const t=new Date(d);return t.toLocaleDateString([], {weekday:'short',month:'short',day:'numeric'});}

  /* progression analytics from logged sets */
  function allSets(){const out=[];(S.history||[]).forEach(h=>{(h.sets||[]).forEach(s=>{if(s&&s.moveId&&s.weight!=null)out.push(Object.assign({when:h.completedAt},s));});});return out;}
  function setsFor(id){return allSets().filter(s=>s.moveId===id).sort((a,b)=>new Date(b.when)-new Date(a.when));}
  function bestFor(id){const s=setsFor(id);if(!s.length)return null;let bw=0,bv=0;s.forEach(x=>{if(x.weight>bw)bw=x.weight;const v=x.weight*(x.reps||0);if(v>bv)bv=v;});return{weight:bw,volume:bv,unit:s[0].unit||S.settings.unit};}
  function lastWeightFor(id){const s=setsFor(id);return s.length?s[0].weight:null;}
  function entryVolume(h){return (h.sets||[]).reduce((a,s)=>a+((s.weight||0)*(s.reps||0)),0);}
  function trainedDays(){const set=new Set();(S.history||[]).forEach(h=>set.add(dayKey(h.completedAt)));return set;}
  function daysThisWeek(){const now=new Date();const start=new Date(now);start.setDate(now.getDate()-now.getDay());start.setHours(0,0,0,0);const set=new Set();(S.history||[]).forEach(h=>{const d=new Date(h.completedAt);if(d>=start)set.add(dayKey(d));});return set.size;}
  function currentStreak(){const days=Array.from(trainedDays());if(!days.length)return 0;const set=new Set(days);let streak=0;let d=new Date();for(let i=0;i<400;i++){if(set.has(dayKey(d))){streak++;}else if(i>0){break;}d.setDate(d.getDate()-1);}return streak;}

  function unit(){return S.settings.unit||'lb';}

  /* feedback cues for audio/haptic */
  let _ac=null;
  function beep(freq,dur,vol){
    if(!S.settings.sound)return;
    try{_ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
      const o=_ac.createOscillator(),g=_ac.createGain();
      o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(_ac.destination);
      g.gain.setValueAtTime(vol||0.18,_ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,_ac.currentTime+(dur||0.15));
      o.start();o.stop(_ac.currentTime+(dur||0.15));
    }catch(e){}
  }
  function buzz(ms){if(S.settings.vibration&&navigator.vibrate){try{navigator.vibrate(ms);}catch(e){}}}
  function cueTick(){beep(660,0.08);buzz(30);}

  /* ---------- WORKOUT DETAIL ---------- */
  function flatten(workout,withWarmup){
    const steps=[];
    function pushBlock(b,roundName,roundIx,roundTot){
      steps.push({moveId:b.id,mode:b.mode,reps:b.reps,duration:b.duration,rest:b.rest||0,
        roundName:roundName||null,roundIx:roundIx||null,roundTot:roundTot||null});
    }
    if(withWarmup){WARMUP.blocks.forEach(b=>pushBlock(b,'Warm-Up'));}
    (workout.blocks||[]).forEach(b=>{
      if(b.type==='round'){
        const tot=b.rounds||1;
        for(let r=1;r<=tot;r++){
          (b.blocks||[]).forEach((ib,ix)=>{
            const isLast=ix===b.blocks.length-1;
            const rest=(isLast&&r<tot&&b.restBetweenRounds!=null)?b.restBetweenRounds:(ib.rest||0);
            steps.push({moveId:ib.id,mode:ib.mode,reps:ib.reps,duration:ib.duration,rest:rest,
              roundName:b.name,roundIx:r,roundTot:tot});
          });
        }
      } else { pushBlock(b); }
    });
    return steps;
  }
  function renderWorkoutDetail(){
    const w=workoutById(view.params.id);if(!w)return renderWorkouts();

  <script>
  /* ============================================================
     PROGRAMS (Phase 2 — multi-week auto-progressing plan)
     ============================================================ */
  const PK='forge-program-v1';
  const PROGRAMS=[{
    id:'longrun', name:'The Long Run', subtitle:'8-week strength + conditioning base', weeks:8, perWeek:3,
    blurb:'A progressive eight-week plan. Three days a week. Start light, build steadily, peak strong, then recover smart — the way real progress is actually built.',
    arc:[
      {wk:1,sessions:['foundation','inferno','iron-core'],note:'Greasing the groove. Move clean and find your weight.',load:'Pick a bell you fully control. Leave 2 reps in the tank on every set.'},
      {wk:2,sessions:['foundation','inferno','iron-core'],note:'Same plan, sharper. Better reps at the same weight.',load:'Same bell as week 1 — make the reps look easy.'},
      {wk:3,sessions:['forge','emom-iron','iron-core'],note:'Step up — The Engine arrives.',load:'Match week 2 weights on shared lifts. Start new lifts conservative.'},
      {wk:4,sessions:['forge','emom-iron','iron-core'],note:'Build. Add load where it felt easy.',load:'Anywhere you left 2+ reps in the tank, go up a bell.'},
      {wk:5,sessions:['forge','inferno','iron-core'],note:'Engine plus burn. Hold your new weights.',load:'Keep the heavier bells from week 4. Stay steady.'},
      {wk:6,sessions:['anvil','emom-iron','iron-core'],note:'Heavy. The Anvil. Slow down, lift more.',load:'Go heavy on the main lifts — 4 to 6 hard, clean reps.'},
      {wk:7,sessions:['anvil','inferno','iron-core'],note:'Peak. Your strongest week.',load:'Push the top weight you can keep clean. This is the test.'},
      {wk:8,sessions:['foundation','inferno','iron-core'],note:'Deload. Lighter, sharper, recover strong.',load:'Drop a bell. Move beautifully. You earned this week.'}
    ]
  }];
  function getProgState(){return load(PK,null);}
  function setProgState(p){save(PK,p);}
  function progDef(id){return PROGRAMS.find(p=>p.id===id);}
  function activeProgram(){const s=getProgState();if(!s)return null;const def=progDef(s.id);return def?{state:s,def}:null;}
  function programSessions(def){const out=[];def.arc.forEach(wk=>wk.sessions.forEach((wid,di)=>out.push({week:wk.wk,dayInWeek:di+1,workoutId:wid,note:wk.note,load:wk.load})));return out;}
  function nextProgSession(){const a=activeProgram();if(!a)return null;return programSessions(a.def)[a.state.pos]||null;}
  function startProgram(id){setProgState({id:id,startedAt:Date.now(),pos:0});}
  function advanceProgram(){const s=getProgState();if(s){s.pos+=1;setProgState(s);}}
  function restartProgram(){const s=getProgState();if(s){s.pos=0;s.startedAt=Date.now();setProgState(s);}}
  function leaveProgram(){try{localStorage.removeItem(PK);}catch(e){}}
  function shortName(id){const w=workoutById(id);return w?w.name:id;}

  function startProgramSession(){
    const s=nextProgSession();if(!s)return;
    const w=workoutById(s.workoutId);if(!w)return;
    startWorkout(w,{program:true,week:s.week,dayInWeek:s.dayInWeek,note:s.note,load:s.load});
  }

  /* home top card — program-aware */
  function homeProgramSection(rec){
    const a=activeProgram();
    if(a){
      const sess=programSessions(a.def),pos=a.state.pos,next=sess[pos];
      if(next){const m=workoutById(next.workoutId);

          <div class="desc">${esc(next.note)}</div>

        </div>`;
      }
      return `<div class="section-h">Your program</div>
        <div class="reco"><div class="tag">${esc(a.def.name)}</div><div class="nm">Program complete ★</div>
        <div class="desc">Eight weeks, done. Run it again heavier, or train freely.</div>
        <button class="btn ghost sm" id="homeProgView">View program</button></div>`;
    }
    return `<div class="section-h">Recommended for you</div>
      <div class="reco">
        <div class="tag">${esc(rec.tag)} \xB7 ${esc(rec.duration)}</div>

        <div class="desc">${esc(rec.description)}</div>
        <button class="btn" data-start="${rec.id}">Start workout</button>
      </div>
      <button class="wkt" id="homeProgStart" style="margin-top:12px;border-color:var(--sage);background:linear-gradient(160deg,rgba(107,128,104,0.14),var(--surface))">
        <div class="nm">Ready to commit? →</div>
        <div class="desc">Follow The Long Run — an 8-week plan that builds you up week by week.</div>
      </button>`;
  }
  function bindHomeProgram(){
    const g=$('#homeProgGo');if(g)g.onclick=()=>startProgramSession();
    const v=$('#homeProgView');if(v)v.onclick=()=>go('program');
    const s=$('#homeProgStart');if(s)s.onclick=()=>go('program');
  }

  function renderProgramOverview(){
    const a=activeProgram();
    if(!a){
      const def=PROGRAMS[0];
      let h=`<button class="pl-quit" data-back="home" style="margin-bottom:14px">← Home</button>
        <div class="page-h">${esc(def.name)}</div><div class="page-sub">${esc(def.subtitle)}</div>
        <div class="muted" style="font-size:14.5px;line-height:1.6;margin-bottom:6px">${esc(def.blurb)}</div>
        <div class="section-h">The arc</div>`;
      def.arc.forEach(wk=>{h+=`<div class="kv"><span class="k">Week ${wk.wk}</span><span>${wk.sessions.map(shortName).join(' \xB7 ')}</span></div>`;});
      h+=`<div class="muted" style="font-size:13px;line-height:1.6;margin:14px 0 16px">${def.weeks} weeks \xB7 ${def.perWeek} days/week \xB7 ${def.weeks*def.perWeek} sessions. Pause or leave anytime — your logs are always saved.</div>
        <button class="btn" id="progStart">Start Week 1</button>`;
      return h;
    }
    const sess=programSessions(a.def),pos=a.state.pos,total=sess.length,next=sess[pos];
    let h=`<button class="pl-quit" data-back="home" style="margin-bottom:14px">← Home</button>
      <div class="page-h">${esc(a.def.name)}</div>
      <div class="page-sub">${pos>=total?'Program complete':('Week '+next.week+' of '+a.def.weeks+' \xB7 '+pos+'/'+total+' sessions')}</div>
      <div class="pl-bar" style="margin:0 0 16px"><i style="width:${Math.round(pos/total*100)}%"></i></div>`;
    let curWk=null;
    sess.forEach((s,ix)=>{
      if(s.week!==curWk){curWk=s.week;
        const isThisWeek=pos>=ix&&pos<ix+a.def.perWeek;
        h+=`<div class="round-h" style="margin-top:16px">Week ${s.week}${isThisWeek?' <span>\xB7 this week</span>':''}</div>`;
      }
      const status=ix<pos?'done':(ix===pos?'now':'todo');
      const m=workoutById(s.workoutId);
      h+=`<div class="kv"${status==='now'?' style="border-bottom-color:var(--sage)"':''}>
        <span class="k">Day ${s.dayInWeek} \xB7 ${esc(m?m.name:s.workoutId)}</span>
        <span>${status==='done'?'✓':(status==='now'?'<span class="accent">Next</span>':'')}</span></div>`;
    });
    if(pos<total){
      h+=`<div class="card" style="margin-top:18px"><div style="font-size:11px;font-weight:700;color:var(--sage);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px">Week ${next.week} focus</div>
        <div style="font-size:14px;line-height:1.55;margin-bottom:6px">${esc(next.note)}</div>
        <div class="muted" style="font-size:13px;line-height:1.5">${esc(next.load)}</div></div>
        <button class="btn" id="progGo" style="margin-top:14px">Start Day ${next.dayInWeek} \xB7 ${esc(shortName(next.workoutId))}</button>`;
    } else {
      h+=`<div class="card" style="margin-top:18px"><div style="font-size:15px;font-weight:800;color:var(--sage-bright)">★ Eight weeks done.</div><div class="muted" style="font-size:13.5px;margin-top:6px;line-height:1.6">You showed up and put in the work. Run it again heavier, or pick any workout freely.</div></div>
        <button class="btn" id="progRestart" style="margin-top:14px">Run it again</button>`;
    }
    h+=`<button class="btn danger sm" id="progLeave" style="margin-top:12px">Leave program</button>`;
    return h;
  }
  afterRender.program=()=>{
    bindBack();
    const st=$('#progStart');if(st)st.onclick=()=>{startProgram('longrun');render();};
    const go_=$('#progGo');if(go_)go_.onclick=()=>startProgramSession();
    const rs=$('#progRestart');if(rs)rs.onclick=()=>{restartProgram();render();toast('Program reset to Week 1');};
    const lv=$('#progLeave');if(lv)lv.onclick=()=>{if(confirm('Leave the program? Your workout history stays saved; you can rejoin anytime.')){leaveProgram();go('home');}};
  };

  <script>
  /* ============================================================
     WORKOUT PLAYER
     ============================================================ */
  let P=null; // player state

  function startWorkout(workout,opts){
    if(!workout)return;
    const steps=flatten(workout,S.settings.warmup);
    P={workout,programCtx:(opts&&opts.program)?opts:null,steps,i:0,phase:'work',timeLeft:0,running:false,startedAt:Date.now(),sets:[],lastBeep:null,timer:null};
    document.body.style.overflow='hidden';
    renderPlayer();
    enterStep();
  }
  function endStepCleanup(){if(P&&P.timer){clearInterval(P.timer);P.timer=null;}}

  function enterStep(){
    if(!P)return;
    if(P.i>=P.steps.length){return finishWorkout();}
    const s=P.steps[P.i];
    P.phase='work';
    if(s.mode==='time'){
      P.timeLeft=s.duration;P.running=true;startTick();
    } else {
      P.running=false;P.timeLeft=0;
    }
    renderPlayer();
  }
  function startTick(){
    endStepCleanup();
    P.lastBeep=null;
    P.timer=setInterval(()=>{
      if(!P.running)return;
      P.timeLeft-=1;
      const tl=P.timeLeft;
      if(tl>0&&tl<=3&&P.lastBeep!==tl){P.lastBeep=tl;cueTick();}
      if(tl<=0){endStepCleanup();cueGo();advancePhase();return;}
      updateTimerUI();
    },1000);
    updateTimerUI();
  }
  function advancePhase(){
    const s=P.steps[P.i];
    if(P.phase==='work'){
      // after work: if loggable & weighted movement, show log; else go to rest
      if(P.phase==='work'&&s.rest>0){P.phase='rest';P.timeLeft=s.rest;P.running=true;renderPlayer();startTick();return;}
      nextStep();
    } else if(P.phase==='rest'){
      nextStep();
    }
  }
  function nextStep(){endStepCleanup();P.i+=1;enterStep();}
  function prevStep(){if(P.i>0){endStepCleanup();P.i-=1;enterStep();}}

  function completeRepStep(){
    // called when user taps Done on a reps step
    const s=P.steps[P.i];cueGo();
    if(s.rest>0){P.phase='rest';P.timeLeft=s.rest;P.running=true;renderPlayer();startTick();}
    else{nextStep();}
  }

  function renderPlayer(){
    let host=$('#overlay');
    if(!P){host.innerHTML='';document.body.style.overflow='';return;}
    const s=P.steps[P.i];const m=MOVES[s.moveId]||{name:s.moveId,cue:'',targets:''};
    const pct=Math.round((P.i/P.steps.length)*100);
    const isRest=P.phase==='rest';
    const isWarm=s.roundName==='Warm-Up';
    let body='';
    if(isRest){
      const nx=P.steps[P.i+1];const nxName=nx?(MOVES[nx.moveId]?MOVES[nx.moveId].name:nx.moveId):'Finish';
      body=`<div class="pl-round">Rest</div>
        <div class="pl-timer rest" id="plTimer">${fmtClock(P.timeLeft)}</div>
        <div class="pl-ring">Up next \xB7 ${esc(nxName)}</div>
        <div style="margin-top:18px"><button class="btn ghost sm" id="skipRest">Skip rest</button></div>`;
    } else if(s.mode==='time'){
      body=`${s.roundName?`<div class="pl-round">${esc(s.roundName)}${s.roundTot>1?` \xB7 Round ${s.roundIx}/${s.roundTot}`:''}</div>`:''}
        <div class="pl-move">${esc(m.name)}</div>
        <div class="pl-timer" id="plTimer">${fmtClock(P.timeLeft)}</div>
        <div class="pl-cue">${esc(m.cue||'')}</div>`;
    } else {
      body=`${s.roundName?`<div class="pl-round">${esc(s.roundName)}${s.roundTot>1?` \xB7 Round ${s.roundIx}/${s.roundTot}`:''}</div>`:''}
        <div class="pl-move">${esc(m.name)}</div>
        <div class="pl-target">${esc(s.reps||'')}</div>
        <div class="pl-cue">${esc(m.cue||'')}</div>`;
    }
    // controls
    let ctrl='';
    if(isRest){
      ctrl=`<div class="pl-foot">
        <button class="icon-btn" id="plPrev">←</button>
        <button class="btn" id="plPause">${P.running?'Pause':'Resume'}</button>
        <button class="icon-btn" id="plNext">→</button></div>`;
    } else if(s.mode==='time'){
      ctrl=`<div class="pl-foot">
        <button class="icon-btn" id="plPrev">←</button>
        <button class="btn" id="plPause">${P.running?'Pause':'Resume'}</button>
        <button class="icon-btn" id="plNext">→</button></div>`;
      if(isLoggable(s.moveId)&&!isWarm)ctrl=`<button class="btn ghost sm" id="plLog" style="margin-bottom:10px">Log weight + reps</button>`+ctrl;
    } else {
      ctrl=`${isLoggable(s.moveId)&&!isWarm?`<button class="btn ghost" id="plLog" style="margin-bottom:10px">Log weight + reps</button>`:''}
        <div class="pl-foot">
        <button class="icon-btn" id="plPrev">←</button>
        <button class="btn" id="plDone">Done</button>
        <button class="icon-btn" id="plNext">→</button></div>`;
    }
    host.innerHTML=`<div class="player">
      <div class="pl-top"><button class="pl-quit" id="plQuit">Quit</button>
        <div class="pl-prog">${P.i+1} / ${P.steps.length}</div></div>
      <div class="pl-bar"><i style="width:${pct}%"></i></div>
      <div class="pl-body" id="plBody">${body}</div>
      <div class="pl-ctrl">${ctrl}</div>
    </div>`;
    bindPlayer();
  }
  function updateTimerUI(){const t=$('#plTimer');if(t)t.textContent=fmtClock(P.timeLeft);
    const bar=$('.pl-bar i');if(bar)bar.style.width=Math.round((P.i/P.steps.length)*100)+'%';}

  function bindPlayer(){
    const q=$('#plQuit');if(q)q.onclick=()=>{if(confirm('Quit this workout? This session won'+String.fromCharCode(39)+'t be saved.')){endStepCleanup();P=null;renderPlayer();}};
    const pa=$('#plPause');if(pa)pa.onclick=()=>{P.running=!P.running;if(P.running&&!P.timer&&P.timeLeft>0)startTick();renderPlayer();};
    const nx=$('#plNext');if(nx)nx.onclick=()=>{endStepCleanup();if(P.phase==='rest'){nextStep();}else{P.i+=1;enterStep();}};
    const pv=$('#plPrev');if(pv)pv.onclick=()=>prevStep();
    const dn=$('#plDone');if(dn)dn.onclick=()=>completeRepStep();
    const sk=$('#skipRest');if(sk)sk.onclick=()=>{endStepCleanup();nextStep();};
    const lg=$('#plLog');if(lg)lg.onclick=()=>openLog(P.steps[P.i]);
  }

  /* ---------- log sheet ---------- */
  function openLog(step){
    const id=step.moveId,m=MOVES[id];
    const prev=lastWeightFor(id);
    const startW=prev!=null?prev:(unit()==='lb'?35:16);
    const existing=(P.sets||[]).filter(x=>x.stepIndex===P.i)[0];
    const w0=existing?existing.weight:startW;
    const r0=existing?existing.reps:'';
    const host=$('#overlay');
    const sheet=document.createElement('div');
    sheet.className='sheet-bg';sheet.id='logSheet';
    sheet.innerHTML=`<div class="sheet"><div class="grab"></div>
      <h3>${esc(m?m.name:id)}</h3>
      <div class="muted" style="font-size:13px;margin-bottom:18px">${esc(step.reps||(step.duration?step.duration+'s':''))}${prev!=null?` \xB7 last: ${prev} ${unit()}`:''}</div>
      <div class="log-grid">
        <div><label>Bell weight (${unit()})</label>
          <div class="stepper"><button id="wDown">−</button><input id="wVal" type="number" inputmode="numeric" value="${w0}"><button id="wUp">+</button></div></div>
        <div><label>Reps done</label>
          <div class="stepper"><button id="rDown">−</button><input id="rVal" type="number" inputmode="numeric" value="${r0}" placeholder="0"><button id="rUp">+</button></div></div>
      </div>
      <button class="btn" id="logSave">Save set</button>
      <button class="btn ghost sm" id="logCancel" style="margin-top:10px">Cancel</button>
    </div>`;
    host.appendChild(sheet);
    const step_=unit()==='lb'?5:2;
    const wv=$('#wVal',sheet),rv=$('#rVal',sheet);
    $('#wUp',sheet).onclick=()=>{wv.value=Math.max(0,(+wv.value||0)+step_);};
    $('#wDown',sheet).onclick=()=>{wv.value=Math.max(0,(+wv.value||0)-step_);};
    $('#rUp',sheet).onclick=()=>{rv.value=Math.max(0,(+rv.value||0)+1);};
    $('#rDown',sheet).onclick=()=>{rv.value=Math.max(0,(+rv.value||0)-1);};
    $('#logCancel',sheet).onclick=()=>sheet.remove();
    sheet.onclick=(e)=>{if(e.target===sheet)sheet.remove();};
    $('#logSave',sheet).onclick=()=>{
      const weight=+wv.value||0,reps=+rv.value||0;
      P.sets=(P.sets||[]).filter(x=>x.stepIndex!==P.i);
      P.sets.push({stepIndex:P.i,moveId:id,weight,reps,unit:unit()});
      sheet.remove();toast('Set logged');buzz(30);
    };
  }

  function finishWorkout(){
    endStepCleanup();
    const dur=Math.round((Date.now()-P.startedAt)/1000);
    const sets=(P.sets||[]).map(s=>({moveId:s.moveId,weight:s.weight,reps:s.reps,unit:s.unit}));
    const moveIds=[...new Set(P.steps.filter(s=>s.roundName!=='Warm-Up').map(s=>s.moveId))];
    const entry={id:Date.now(),workoutId:P.workout.id,workoutName:P.workout.name,
      completedAt:new Date().toISOString(),duration:dur,tag:P.workout.tag,custom:!!P.workout.custom,
      sets,movements:moveIds.length};
    S.history=[entry].concat(S.history||[]).slice(0,500);saveHistory();
    const vol=sets.reduce((a,s)=>a+((s.weight||0)*(s.reps||0)),0);
    // PR check
    let prs=0;sets.forEach(s=>{const others=allSets().filter(x=>x.moveId===s.moveId&&x.when!==entry.completedAt);const max=others.reduce((a,x)=>Math.max(a,x.weight),0);if(s.weight>max&&s.weight>0)prs++;});
    const w=P.workout;const wasProgram=P.programCtx;P=null;if(wasProgram)advanceProgram();
    const host=$('#overlay');
    host.innerHTML=`<div class="player"><div class="pl-body">
      <div class="pl-round">Workout complete</div>
      <div class="pl-move" style="font-size:28px">${esc(w.name)}</div>
      <div class="stat-row" style="max-width:380px;width:100%;margin-top:22px">
        <div class="stat"><div class="n">${fmtClock(dur)}</div><div class="l">Time</div></div>
        <div class="stat"><div class="n">${vol?Math.round(vol).toLocaleString():'—'}</div><div class="l">${unit()} volume</div></div>
        <div class="stat"><div class="n">${prs||'0'}</div><div class="l">New PRs</div></div>
      </div>
      ${prs?`<div class="pl-cue" style="color:var(--sage-bright);margin-top:14px">★ ${prs} new personal record${prs>1?'s':''}. Strong work.</div>`:`<div class="pl-cue" style="margin-top:14px">Logged and done. See you next session.</div>`}
      </div>
      <div class="pl-ctrl"><button class="btn" id="finishDone">Done</button></div></div>`;
    document.body.style.overflow='';
    $('#finishDone').onclick=()=>{$('#overlay').innerHTML='';go(wasProgram?'program':'progress');};
  }

  /* ============================================================
     HISTORY DETAIL SHEET
     ============================================================ */
  function openHistorySheet(id){
    const e=(S.history||[]).find(h=>String(h.id)===String(id));if(!e)return;
    const host=$('#overlay');const sheet=document.createElement('div');sheet.className='sheet-bg';
    const vol=entryVolume(e);
    let setsHtml='';
    if((e.sets||[]).length){setsHtml=`<div class="section-h" style="margin-top:14px">Logged sets</div>`+
      e.sets.map(s=>`<div class="kv"><span class="k">${esc(moveName(s.moveId))}</span><span>${s.weight} ${esc(s.unit||unit())} \xD7 ${s.reps||'—'}</span></div>`).join('');}
    else{setsHtml=`<div class="muted" style="font-size:13px;margin-top:14px">No weights were logged for this session.</div>`;}
    sheet.innerHTML=`<div class="sheet"><div class="grab"></div>
      <h3>${esc(e.workoutName||'Workout')}</h3>
      <div class="muted" style="font-size:13px;margin-bottom:8px">${fmtDate(e.completedAt)} \xB7 ${fmtClock(e.duration||0)}${vol?` \xB7 ${Math.round(vol).toLocaleString()} ${unit()} volume`:''}</div>
      ${setsHtml}
      <button class="btn" id="hRepeat" style="margin-top:18px">Repeat this workout</button>
      <button class="btn ghost sm" id="hClose" style="margin-top:10px">Close</button></div>`;
    host.appendChild(sheet);
    sheet.onclick=(ev)=>{if(ev.target===sheet)sheet.remove();};
    $('#hClose',sheet).onclick=()=>sheet.remove();
    $('#hRepeat',sheet).onclick=()=>{sheet.remove();const w=workoutById(e.workoutId);if(w)startWorkout(w);else toast('That workout is no longer available');};
  }

  /* ============================================================
     BUILDER (simple custom workout)
     ============================================================ */
  let draft=null;
  function renderBuilder(){
    if(!draft)draft={name:'',items:[]};
    let html=`<button class="pl-quit" data-back="workouts" style="margin-bottom:14px">← Workouts</button>
    <div class="page-h">Build a workout</div><div class="page-sub">Pick movements, set reps or time, done.</div>
    <input id="bName" placeholder="Workout name" value="${esc(draft.name)}" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--bone);font-size:16px;margin-bottom:16px">
    <div class="section-h">Movements (${draft.items.length})</div>`;
    if(draft.items.length){html+=draft.items.map((it,ix)=>`<div class="kv"><span class="k">${esc(moveName(it.id))}</span><span>${it.mode==='time'?it.duration+'s':esc(it.reps)} <button data-rm="${ix}" style="color:var(--danger);margin-left:10px">✕</button></span></div>`).join('');}
    else{html+=`<div class="muted" style="font-size:13px;margin-bottom:8px">Add your first movement below.</div>`;}
    html+=`<button class="btn ghost sm" id="bAdd" style="margin-top:12px">+ Add movement</button>
    <div style="height:18px"></div>
    <button class="btn" id="bSave">Save workout</button>`;
    return html;
  }
  afterRender.builder=()=>{
    bindBack();
    $('#bName').oninput=(e)=>draft.name=e.target.value;
    $$('[data-rm]').forEach(b=>b.onclick=()=>{draft.items.splice(+b.dataset.rm,1);render();});
    $('#bAdd').onclick=openAddMovement;
    $('#bSave').onclick=()=>{
      if(!draft.name.trim()){toast('Give it a name');return;}
      if(!draft.items.length){toast('Add at least one movement');return;}
      const w={id:'custom-'+Date.now(),name:draft.name.trim(),tag:'Custom',duration:'~'+Math.max(8,draft.items.length*4)+' min',
        custom:true,description:'Your custom workout.',blocks:draft.items.map(it=>({id:it.id,mode:it.mode,reps:it.reps,duration:it.duration,rest:it.rest||30}))};
      S.customs=[w].concat(S.customs||[]);saveCustoms();draft=null;toast('Workout saved');go('workoutDetail',{id:w.id});
    };
  };
  function openAddMovement(){
    const host=$('#overlay');const sheet=document.createElement('div');sheet.className='sheet-bg';
    sheet.innerHTML=`<div class="sheet"><div class="grab"></div><h3>Add movement</h3>
      <div class="muted" style="font-size:13px;margin-bottom:14px">Tap a movement, then set reps or time.</div>
      <div id="addList" class="lib-grid" style="max-height:50vh;overflow-y:auto"></div>
      <button class="btn ghost sm" id="addClose" style="margin-top:14px">Close</button></div>`;
    host.appendChild(sheet);
    $('#addList',sheet).innerHTML=Object.keys(MOVES).map(id=>`<button class="lib-row" data-add="${id}"><div class="ic">${initials(MOVES[id].name)}</div><div style="flex:1"><div class="nm">${esc(MOVES[id].name)}</div><div class="sub">${esc(MOVES[id].category)}</div></div></button>`).join('');
    sheet.onclick=(ev)=>{if(ev.target===sheet)sheet.remove();};
    $('#addClose',sheet).onclick=()=>sheet.remove();
    $$('[data-add]',sheet).forEach(b=>b.onclick=()=>{configMovement(b.dataset.add,sheet);});
  }
  function configMovement(id,sheet){
    sheet.querySelector('.sheet').innerHTML=`<div class="grab"></div><h3>${esc(moveName(id))}</h3>
      <div class="section-h">Mode</div>
      <div class="chips" id="cMode"><button class="chip on" data-mode="reps">Reps</button><button class="chip" data-mode="time">Time</button></div>
      <div id="cReps" style="margin-top:14px"><label style="font-size:11px;color:var(--steel);text-transform:uppercase">Reps</label>
        <input id="cRepsV" value="10" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--bone);font-size:16px;margin-top:6px"></div>
      <div id="cTime" class="hide" style="margin-top:14px"><label style="font-size:11px;color:var(--steel);text-transform:uppercase">Seconds</label>
        <input id="cTimeV" type="number" value="40" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--bone);font-size:16px;margin-top:6px"></div>
      <div style="margin-top:14px"><label style="font-size:11px;color:var(--steel);text-transform:uppercase">Rest after (sec)</label>
        <input id="cRest" type="number" value="30" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--bone);font-size:16px;margin-top:6px"></div>
      <button class="btn" id="cAdd" style="margin-top:18px">Add to workout</button>`;
    let mode='reps';
    $$('#cMode [data-mode]',sheet).forEach(b=>b.onclick=()=>{mode=b.dataset.mode;
      $$('#cMode .chip',sheet).forEach(c=>c.classList.toggle('on',c.dataset.mode===mode));
      $('#cReps',sheet).classList.toggle('hide',mode!=='reps');
      $('#cTime',sheet).classList.toggle('hide',mode!=='time');});
    $('#cAdd',sheet).onclick=()=>{
      const it={id,mode,rest:+$('#cRest',sheet).value||0};
      if(mode==='reps')it.reps=$('#cRepsV',sheet).value||'10';else it.duration=+$('#cTimeV',sheet).value||40;
      draft.items.push(it);sheet.remove();render();
    };
  }

  /* ============================================================
     ONBOARDING
     ============================================================ */
  let ob={step:0,goal:null,experience:null,unit:'lb',bells:[]};
  function startOnboarding(redo){
    ob={step:redo?1:0,goal:S.settings.goal,experience:S.settings.experience,unit:S.settings.unit||'lb',bells:S.settings.bells||[]};
    renderOb();
  }
  const OB_BELLS={lb:[18,26,35,44,53,62,70],kg:[8,12,16,20,24,28,32]};
  function renderOb(){
    const host=$('#overlay');
    $('#topbar').classList.add('hide');$('#tabs').classList.add('hide');
    const dots=(n)=>`<div class="ob-dots">${[1,2,3,4].map(i=>`<i class="${i<=n?'on':''}"></i>`).join('')}</div>`;
    let inner='';
    if(ob.step===0){
      inner=`<svg class="logo" viewBox="0 0 100 100" fill="currentColor"><path d="M38 14 Q38 6 50 6 Q62 6 62 14 L62 28 Q62 30 60 30 L58 30 Q56 30 56 28 L56 18 Q56 12 50 12 Q44 12 44 18 L44 28 Q44 30 42 30 L40 30 Q38 30 38 28 Z"/><ellipse cx="50" cy="62" rx="34" ry="32"/><rect x="34" y="28" width="32" height="8" rx="2"/></svg>
        <h2>Kettlebell workouts built for the long run.</h2>
        <p>One bell. Twenty-seven movements. Six sessions. Horsepower guides every set, tracks the weight you lift, and shows you getting stronger over time.</p>
        <div class="card" style="margin-bottom:20px"><div class="muted" style="font-size:13px;line-height:1.6">A quick note: this is a training guide, not medical advice. Warm up, use a weight you control, and stop if you feel sharp pain. Check with a doctor first if you have health concerns.</div></div>
        <div class="spacer"></div>
        <button class="btn" id="obStart">Set me up — takes 20 seconds</button>`;
    } else if(ob.step===1){
      inner=dots(1)+`<h2>What are you training for?</h2>
        ${obOpt('goal','strength','Strength','Get stronger on the big lifts.')}
        ${obOpt('goal','conditioning','Conditioning','Build the engine, burn the lungs.')}
        ${obOpt('goal','core','Core & stability','Bracing, control, a bulletproof midline.')}
        ${obOpt('goal','general','A bit of everything','Balanced, sustainable fitness.')}
        <div class="spacer"></div><button class="btn" id="obNext" ${ob.goal?'':'disabled'}>Continue</button>`;
    } else if(ob.step===2){
      inner=dots(2)+`<h2>How much kettlebell experience?</h2>
        ${obOpt('experience','new','New to it','Just starting, or coming back.')}
        ${obOpt('experience','some','Some','Comfortable with the basics.')}
        ${obOpt('experience','experienced','Experienced','I know my way around a bell.')}
        <div class="spacer"></div><button class="btn" id="obNext" ${ob.experience?'':'disabled'}>Continue</button>`;
    } else if(ob.step===3){
      inner=dots(3)+`<h2>Pounds or kilograms?</h2>
        <p>How you'd like to log your bell weight.</p>
        <div class="chips" style="margin-bottom:16px"><button class="chip ${ob.unit==='lb'?'on':''}" data-u="lb">Pounds (lb)</button><button class="chip ${ob.unit==='kg'?'on':''}" data-u="kg">Kilograms (kg)</button></div>
        <h2 style="font-size:20px;margin-top:10px">Which bells do you own?</h2>
        <p>Optional — helps us suggest the right load. Tap all you have.</p>
        <div class="chips" id="bellChips">${OB_BELLS[ob.unit].map(b=>`<button class="chip ${ob.bells.indexOf(b)>=0?'on':''}" data-bell="${b}">${b} ${ob.unit}</button>`).join('')}</div>
        <div class="spacer"></div><button class="btn" id="obNext">Continue</button>`;
    } else {
      const rec=workoutById(recommendId())||PRESETS[0];
      inner=dots(4)+`<h2>You're set.</h2>
        <p>Based on what you told us, start here:</p>
        <div class="reco" style="margin-bottom:18px"><div class="tag">${esc(rec.tag)} \xB7 ${esc(rec.duration)}</div>
          <div class="nm">${esc(rec.name)}</div><div class="desc">${esc(rec.description)}</div></div>
        <p class="muted" style="font-size:13.5px">You can pick any of the six workouts any time, and build your own. Let's go.</p>
        <div class="spacer"></div>
        <button class="btn" id="obFinish">Start training</button>`;
    }
    host.innerHTML=`<div class="ob"><div class="ob-in">${inner}</div></div>`;
    bindOb();
  }
  function obOpt(field,val,t,d){return `<button class="ob-opt ${ob[field]===val?'on':''}" data-opt="${field}:${val}"><div class="t">${t}</div><div class="d">${d}</div></button>`;}
  function bindOb(){
    const s=$('#overlay');
    const start=$('#obStart',s);if(start)start.onclick=()=>{ob.step=1;renderOb();};
    $$('[data-opt]',s).forEach(b=>b.onclick=()=>{const[f,v]=b.dataset.opt.split(':');ob[f]=v;renderOb();});
    $$('[data-u]',s).forEach(b=>b.onclick=()=>{ob.unit=b.dataset.u;ob.bells=[];renderOb();});
    $$('[data-bell]',s).forEach(b=>b.onclick=()=>{const v=+b.dataset.bell;const i=ob.bells.indexOf(v);if(i>=0)ob.bells.splice(i,1);else ob.bells.push(v);renderOb();});
    const nx=$('#obNext',s);if(nx)nx.onclick=()=>{ob.step+=1;renderOb();};
    const fin=$('#obFinish',s);if(fin)fin.onclick=()=>{
      Object.assign(S.settings,{onboarded:true,goal:ob.goal,experience:ob.experience,unit:ob.unit,bells:ob.bells});
      saveSettings();$('#overlay').innerHTML='';go('home');
    };
  }

  /* ============================================================
     INIT
     ============================================================ */
  $('#gearBtn').onclick=()=>go('settings');
  if(!S.settings.onboarded){startOnboarding(false);} else {render();}
  </script>
  <script>
  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/service-worker.js').catch(function(){});});}
  </script>
</body>
</html>
